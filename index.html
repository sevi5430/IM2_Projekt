<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cocktail API</title>
    <!-- CSS einbinden -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Header mit Titel und Info-Boxen -->
    <header>
      <h1>Who am I?</h1>

      <!-- Boxen für Liga und Saison -->
      <div class="box-container">
        <div class="round-box">
          <p>Premiere League</p>
        </div>
        <div class="round-box">
          <p>Saison 2024/25</p>
        </div>
      </div>
    </header>

    <!-- Hauptinhalt der Seite -->
    <main>
      <h2>Main Content</h2>
      <p>This is the main content of the page.</p>
    </main>

    <!-- Fusszeile -->
    <footer>
      <p>This is the footer of the page.</p>
    </footer>

    <!-- JavaScript einbinden -->
    <script src="js/script.js" type="module"></script>
  </body>
</html>
