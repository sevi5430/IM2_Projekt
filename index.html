<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Who am I?</title>

    <!-- CSS einbinden -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Navigationsbar mit Logo oben links -->
    <nav>
      <img src="assets/prem-league-logo.svg" alt="Premier League Logo" />
    </nav>

    <!-- Header mit Titel und Info-Boxen -->
    <header>
      <h1>Who am I?</h1>

      <!-- Boxen für Liga und Saison -->
      <div class="box-container">
        <div class="round-box">
          <p>Premiere League</p>
        </div>
        <div class="round-box">
          <p>Saison 2024/25</p>
        </div>
      </div>
    </header>

    <!-- Hauptinhalt der Seite -->
    <main>
      <!-- Versuche-Anzeige mit Titel und 10 Kreisen -->
      <div class="attempts-container">
        <span class="attempts-title">Versuche</span>
        <div class="attempts-circles">
          <div class="attempt-circle"></div>
          <div class="attempt-circle"></div>
          <div class="attempt-circle"></div>
          <div class="attempt-circle"></div>
          <div class="attempt-circle"></div>
          <div class="attempt-circle"></div>
          <div class="attempt-circle"></div>
          <div class="attempt-circle"></div>
          <div class="attempt-circle"></div>
          <div class="attempt-circle"></div>
        </div>
      </div>

      <!-- Suchbereich zum Suchen eines Spielers -->
      <div class="search-container">
        <!-- Wrapper für Input und Dropdown -->
        <div class="search-wrapper">
          <input
            class="search-input"
            type="text"
            placeholder="Hier Spielername eingeben"
          />
          <!-- Dropdown mit Spielervorschlägen -->
          <div class="search-dropdown"></div>
        </div>
        <button class="search-button">
          Guess
          <svg
            class="search-icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 10 10"
          >
            <polygon class="search-icon-polygon" points="2,1 9,5 2,9" />
          </svg>
        </button>
      </div>

      <!-- Tabelle mit den bisherigen Guess-Versuchen -->
      <div class="guess-table">
        <!-- Kopfzeile der Tabelle -->
        <div class="guess-header">
          <span>SPIELER</span>
          <span>NATION</span>
          <span>VEREIN</span>
          <span>ALTER</span>
          <span>POS.</span>
          <span>LIGA</span>
        </div>

        <!-- Guess-Zeilen werden per JS hier eingefügt -->
        <div class="guess-rows"></div>
      </div>
    </main>

    <!-- Fusszeile -->
    <footer></footer>

    <!-- JavaScript einbinden -->
    <script src="js/script.js" type="module"></script>
  </body>
</html>
